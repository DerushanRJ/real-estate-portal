<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorites | Real Estate Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#f5f7fa;
        }

        .navbar{
            background-color:#1a3c5e;
        }

        .page-container{
            max-width:1100px;
            margin:40px auto;
        }

        .property-card{
            border:none;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .property-card:hover{
            transform:translateY(-5px);
        }

        .property-image{
            height:220px;
            object-fit:cover;
        }

        .btn-custom{
            background-color:#1a3c5e;
            border:none;
        }

        .btn-custom:hover{
            background-color:#16324f;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark px-4 py-3">

    <a class="navbar-brand fw-bold" href="index.html">
        🏠 Real Estate Portal
    </a>

    <div>
        <a href="properties.html" class="btn btn-outline-light btn-sm">
            Properties
        </a>
    </div>

</nav>

<!-- CONTENT -->

<div class="container page-container">

    <h2 class="fw-bold mb-4">
        My Favorite Properties
    </h2>

    <div class="row g-4" id="favoritesContainer">

    </div>

</div>

<!-- JAVASCRIPT -->

<script>

   
    const userId = 1;

    fetch(`http://localhost:8080/api/favorites/user/${userId}`)

        .then(response => response.json())

        .then(favorites => {

            const container =
                document.getElementById("favoritesContainer");

            if(favorites.length === 0)
            {
                container.innerHTML =
                    "<p>No favorite properties found.</p>";

                return;
            }

            favorites.forEach(favorite => {

                const property = favorite.property;

                container.innerHTML += `

                    <div class="col-md-4">

                        <div class="card property-card h-100">

                            <img
                                src="https://images.unsplash.com/photo-1568605114967-8130f3a36994"
                                class="card-img-top property-image"
                                alt="Property Image"
                            >

                            <div class="card-body">

                                <h5 class="card-title">
                                    ${property.title}
                                </h5>

                                <p class="text-muted">
                                    ${property.type}
                                </p>

                                <h4 class="fw-bold text-primary">
                                    $${property.price}
                                </h4>

                                <p>
                                    ${property.location ?
                                        property.location.city : ""}
                                </p>

                                <a
                                    href="property-details.html"
                                    class="btn btn-custom text-white w-100"
                                >
                                    View Details
                                </a>

                            </div>

                        </div>

                    </div>

                `;

            });

        })

        .catch(error => console.error(error));

</script>

</body>
</html>
