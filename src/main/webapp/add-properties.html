        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Property | Real Estate Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background-color:#f5f7fa;
        }

        .navbar{
            background-color:#1a3c5e;
        }

        .form-card{
            max-width:850px;
            margin:40px auto;
            border:none;
            border-radius:15px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
        }

        .card-header{
            background-color:#1a3c5e;
            color:white;
            border-radius:15px 15px 0 0 !important;
            padding:20px;
        }

        .btn-custom{
            background-color:#1a3c5e;
            border:none;
        }

        .btn-custom:hover{
            background-color:#16324f;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark px-4 py-3">

    <a class="navbar-brand fw-bold"
       href="index.html">

        🏠 Real Estate Portal

    </a>

    <div>

        <a href="properties.html"
           class="btn btn-outline-light btn-sm">

            View Properties

        </a>

    </div>

</nav>

<!-- FORM -->

<div class="container">

    <div class="card form-card">

        <div class="card-header">

            <h3 class="mb-0">
                Add New Property
            </h3>

        </div>

        <div class="card-body p-4">

            <form id="propertyForm">

                <!-- TITLE -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Property Title
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            id="title"
                            required
                    >

                </div>

                <!-- PRICE -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Price
                    </label>

                    <input
                            type="number"
                            class="form-control"
                            id="price"
                            required
                    >

                </div>

                <!-- TYPE -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Property Type
                    </label>

                    <select
                            class="form-select"
                            id="type"
                            required
                    >
                        <option value="">
                            Select Type
                        </option>

                        <option value="HOUSE">
                            HOUSE
                        </option>

                        <option value="LAND">
                            LAND
                        </option>

                        <option value="APARTMENT">
                            APARTMENT
                        </option>

                    </select>

                </div>

                <!-- DESCRIPTION -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Description
                    </label>

                    <textarea
                            class="form-control"
                            rows="5"
                            id="description"
                            required
                    ></textarea>

                </div>

                <!-- AGENT -->

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Agent User ID
                    </label>

                    <input
                            type="number"
                            class="form-control"
                            id="agentId"
                            required
                    >

                </div>

                <!-- LOCATION -->

                <h5 class="mt-4 mb-3">
                    Location Information
                </h5>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            City
                        </label>

                        <input
                                type="text"
                                class="form-control"
                                id="city"
                                required
                        >

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-semibold">
                            District
                        </label>

                        <input
                                type="text"
                                class="form-control"
                                id="district"
                                required
                        >

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Street
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            id="street"
                            required
                    >

                </div>

                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Postal Code
                    </label>

                    <input
                            type="text"
                            class="form-control"
                            id="postalCode"
                            required
                    >

                </div>

                <!-- BUTTON -->

                <div class="d-grid">

                    <button
                            type="submit"
                            class="btn btn-custom text-white btn-lg"
                    >
                        Add Property
                    </button>

                </div>

            </form>

            <!-- SUCCESS MESSAGE -->

            <div
                    class="alert alert-success mt-4 d-none"
                    id="successMessage"
            >
                Property added successfully!
            </div>

        </div>

    </div>

</div>

<!-- JAVASCRIPT -->

<script>

    document
        .getElementById("propertyForm")

        .addEventListener("submit", function(event)
        {

            event.preventDefault();

            const propertyData =
            {
                title:
                    document.getElementById("title").value,

                price:
                    parseFloat(
                        document.getElementById("price").value
                    ),

                type:
                    document.getElementById("type").value,

                description:
                    document.getElementById("description").value,

                agent:
                {
                    userID:
                        parseInt(
                            document.getElementById("agentId").value
                        )
                },

                location:
                {
                    city:
                        document.getElementById("city").value,

                    district:
                        document.getElementById("district").value,

                    street:
                        document.getElementById("street").value,

                    postalCode:
                        document.getElementById("postalCode").value
                }
            };

            fetch("http://localhost:8080/api/properties",
            {
                method: "POST",

                headers:
                {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(propertyData)

            })

            .then(response =>
            {
                if(!response.ok)
                {
                    throw new Error("Failed to add property");
                }

                return response.json();
            })

            .then(data =>
            {
                document
                    .getElementById("successMessage")
                    .classList
                    .remove("d-none");

                document
                    .getElementById("propertyForm")
                    .reset();
            })

            .catch(error =>
            {
                console.error(error);

                alert("Error adding property");
            });

        });

</script>

</body>
</html>
