<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Update Property | Real Estate Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background-color: #f8f9fa;
        }

        /* Navbar */
        .navbar-custom {
            background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
            padding: 15px 0;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .nav-link {
            color: rgba(255,255,255,0.85) !important;
            margin-left: 15px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: white !important;
        }

        /* Form Card */
        .form-card {
            max-width: 850px;
            margin: 50px auto;
            border: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            background: white;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #1a3c5e 0%, #2d6a9f 100%);
            color: white;
            padding: 30px;
        }

        .card-header-custom h2 {
            margin: 0;
            font-weight: bold;
        }

        .card-header-custom p {
            margin: 8px 0 0;
            opacity: 0.8;
        }

        .section-title {
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1a3c5e;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 0.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #444;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #dcdcdc;
        }

        .form-control:focus {
            border-color: #1a3c5e;
            box-shadow: 0 0 0 0.2rem rgba(26,60,94,0.15);
        }

        .btn-primary {
            background-color: #1a3c5e;
            border-color: #1a3c5e;
            padding: 12px;
            font-weight: 600;
            border-radius: 10px;
        }

        .btn-primary:hover {
            background-color: #16324f;
            border-color: #16324f;
        }

    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom">

    <div class="container">

        <a class="navbar-brand" href="#">
            Real Estate Portal
        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link" href="viewProperties.html">
                View Properties
            </a>

            <a class="nav-link" href="addProperty.html">
                Add Property
            </a>

            <a class="nav-link" href="deleteProperty.html">
                Delete Property
            </a>

        </div>

    </div>

</nav>

<!-- Main Form -->
<div class="container">

    <div class="card form-card">

        <!-- Header -->
        <div class="card-header-custom">

            <h2>Update Property Listing</h2>

            <p>
                Edit and manage your property information
            </p>

        </div>

        <!-- Body -->
        <div class="card-body p-4">

            <form id="updateForm" action="UpdatePropertyServlet" method="post">

                <!-- Property Section -->
                <div class="section-title">
                    Property Details
                </div>

                <div class="mb-3">

                    <label for="prop-id" class="form-label">
                        Property ID
                    </label>

                    <input type="text"
                           id="prop-id"
                           name="id"
                           class="form-control"
                           readonly
                           style="background-color: #e9ecef;">

                </div>

                <input type="hidden" id="createDate" name="createDate">

                <div class="mb-3">

                    <label for="title" class="form-label">
                        Title
                    </label>

                    <input type="text"
                           id="title"
                           name="title"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label for="location" class="form-label">
                        Location
                    </label>

                    <input type="text"
                           id="location"
                           name="location"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label for="price" class="form-label">
                        Price ($)
                    </label>

                    <input type="number"
                           step="0.01"
                           min="0.01"
                           id="price"
                           name="price"
                           class="form-control">

                </div>

                <!-- Agent Section -->
                <div class="section-title">
                    Agent Details
                </div>

                <div class="mb-3">

                    <label for="agentName" class="form-label">
                        Agent Name
                    </label>

                    <input type="text"
                           id="agentName"
                           name="agentName"
                           class="form-control">

                </div>

                <div class="mb-3">

                    <label for="phoneNumber" class="form-label">
                        Phone Number
                    </label>

                    <input type="text"
                           id="phoneNumber"
                           name="phoneNumber"
                           class="form-control"
                           pattern="\d{10}"
                           title="Phone number must be exactly 10 digits">

                </div>

                <div class="mb-3">

                    <label for="agencyName" class="form-label">
                        Agency Name
                    </label>

                    <input type="text"
                           id="agencyName"
                           name="agencyName"
                           class="form-control">

                </div>

                <div class="mb-4">

                    <label for="licenseNumber" class="form-label">
                        License Number
                    </label>

                    <input type="text"
                           id="licenseNumber"
                           name="licenseNumber"
                           class="form-control">

                </div>

                <!-- Submit Button -->
                <div class="d-grid">

                    <button type="submit" class="btn btn-primary btn-lg">
                        Update Listing
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script src="js/main.js"></script>

</body>
</html>
